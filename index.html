
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Character Counter</h1>
        <p>200 characters max</p>

        <textarea id="messageArea" maxlength="200" placeholder="Type your message here..."></textarea>

        <p id="charCount">0/200 characters</p>

        <p id="warningMessage" class="warning hidden">⚠ Character limit reached! You cannot type any more.</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
